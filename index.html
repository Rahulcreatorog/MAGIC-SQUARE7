```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Square Adventure</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    color:white;
    background: linear-gradient(270deg,#ff00cc,#3333ff,#00ffcc,#ffcc00);
    background-size: 800% 800%;
    animation: bg 10s infinite alternate;
}
@keyframes bg {
    0%{background-position:left;}
    100%{background-position:right;}
}

.card {
    background: rgba(0,0,0,0.6);
    margin:10px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 20px cyan;
}

.grid {
    display:grid;
    gap:5px;
    justify-content:center;
    margin:15px;
}

.cell {
    width:70px;
    height:70px;
    border:2px solid white;
    line-height:70px;
    font-size:22px;
    background: rgba(255,255,255,0.2);
}

.num {
    padding:10px;
    margin:5px;
    background:orange;
    border-radius:8px;
    display:inline-block;
    cursor:grab;
}

button {
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:cyan;
    cursor:pointer;
}

/* Sidebar */
.sidebar {
    position:fixed;
    right:10px;
    top:80px;
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:10px;
}
</style>

<script>
let dragged;
let size = 3;
let level = 1;
let score = 0;
let timer;
let time = 0;

// Drag
function drag(e){ dragged = e.target; }
function allowDrop(e){ e.preventDefault(); }
function drop(e){
    e.preventDefault();
    if(e.target.innerText==""){
        e.target.innerText = dragged.innerText;
        dragged.style.display="none";
    }
}

// Create grid
function createGrid(){
    let grid = document.getElementById("grid");
    grid.innerHTML="";
    grid.style.gridTemplateColumns=`repeat(${size},70px)`;
    for(let i=0;i<size*size;i++){
        let d=document.createElement("div");
        d.className="cell";
        d.ondrop=drop;
        d.ondragover=allowDrop;
        grid.appendChild(d);
    }
}

// Numbers
function numbers(){
    let n=document.getElementById("numbers");
    n.innerHTML="";
    for(let i=1;i<=size*size;i++){
        let s=document.createElement("span");
        s.className="num";
        s.innerText=i;
        s.draggable=true;
        s.ondragstart=drag;
        n.appendChild(s);
    }
}

// Start level
function startGame(s){
    size=s;
    level=1;
    score=0;
    document.getElementById("menu").style.display="none";
    loadLevel();
}

// Load level
function loadLevel(){
    createGrid();
    numbers();
    let sum = size*(size*size+1)/2;
    document.getElementById("goal").innerText="🎯 Goal: "+sum;
    alert("🔥 Level "+level+" Start!");
}

// Check
function check(){
    let cells=document.querySelectorAll(".cell");
    let nums=[...cells].map(x=>Number(x.innerText));
    let target=size*(size*size+1)/2;
    let correct=true;

    // rows
    for(let i=0;i<size;i++){
        let sum=0;
        for(let j=0;j<size;j++) sum+=nums[i*size+j];
        if(sum!==target) correct=false;
    }

    // columns
    for(let i=0;i<size;i++){
        let sum=0;
        for(let j=0;j<size;j++) sum+=nums[j*size+i];
        if(sum!==target) correct=false;
    }

    // diagonals
    let d1=0,d2=0;
    for(let i=0;i<size;i++){
        d1+=nums[i*size+i];
        d2+=nums[i*size+(size-1-i)];
    }
    if(d1!==target||d2!==target) correct=false;

    if(correct){
        score+=10;
        level++;
        alert("🎉 Correct! Score: "+score);

        if(level>25){
            alert("🏆 Completed 25 levels! More coming soon!");
            showMenu();
        } else {
            loadLevel();
        }
    } else {
        alert("❌ Wrong, try again!");
    }
}

// Reset
function reset(){
    document.querySelectorAll(".cell").forEach(c=>c.innerText="");
    document.querySelectorAll(".num").forEach(n=>n.style.display="inline-block");
}

// Hint
function hint(){
    let sum = size*(size*size+1)/2;
    alert("💡 All rows, columns & diagonals = "+sum);
}

// Menu
function showMenu(){
    document.getElementById("menu").style.display="block";
    document.getElementById("grid").innerHTML="";
    document.getElementById("numbers").innerHTML="";
}
</script>
</head>

<body>

<h2>😈 Magic Square Adventure</h2>

<!-- MENU -->
<div id="menu" class="card">
<h3>Select Grid</h3>
<button onclick="startGame(2)">2x2</button>
<button onclick="startGame(3)">3x3</button>
<button onclick="startGame(4)">4x4</button>
</div>

<!-- GAME -->
<div class="card">
<p id="goal"></p>
<p>🏆 Score: <span id="score">0</span></p>
</div>

<div id="grid" class="grid"></div>
<div id="numbers"></div>

<div class="card">
<button onclick="check()">Check</button>
<button onclick="reset()">Reset</button>
<button onclick="hint()">Hint</button>
<button onclick="showMenu()">Menu</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h4>🌐 Multiplayer</h4>
<p>Download our app for battles!</p>
<a href="#"><button>Download App 📱</button></a>
</div>

</body>
</html>
```
